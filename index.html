<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinefile -- Personal Ledger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root {
    --ink:        #15130f;
    --ink-soft:   #8a8171;
    --sienna:     #e67e58;
    --sienna-deep:#bf6545;
    --moss:       #56624c;
    --brass:      #b8893f;
    --night:      #15130f;
    --night-card: #1c1a14;
    --night-rule: #3f3a2d;
    --paper-on-night: #ece3cf;
    --paper:      #f4eee1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--night); color: var(--paper-on-night); font-family: 'Archivo', sans-serif; min-height: 100vh; overflow-x: hidden;
    background-image: radial-gradient(ellipse at top, rgba(184,137,63,0.08), transparent 60%), repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }

  .masthead { padding: 22px 44px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; background: rgba(21,19,15,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--night-rule); }
  .masthead-mark { display: flex; align-items: baseline; gap: 10px; }
  .masthead-mark .reel { font-family: 'Anton', sans-serif; font-size: 1.55rem; text-transform: uppercase; color: var(--paper-on-night); }
  .masthead-mark .reel em { font-style: normal; color: var(--brass); }
  .masthead-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); border-left: 1px solid var(--night-rule); padding-left: 10px; }
  
  .header-right { display: flex; align-items: center; gap: 18px; }
  .view-switcher { display: flex; gap: 0; border: 1px solid var(--night-rule); border-radius: 3px; overflow: hidden; }
  .view-btn { background: transparent; border: none; border-right: 1px solid var(--night-rule); color: var(--ink-soft); padding: 8px 18px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .view-btn:last-child { border-right: none; }
  .view-btn:hover { color: var(--paper-on-night); background: rgba(255,255,255,0.03); }
  .view-btn.active { background: var(--sienna); color: var(--paper); }
  .view-page { display: none; }
  .view-page.active { display: block; }

  .hero { padding: 56px 44px 36px; border-bottom: 1px solid var(--night-rule); }
  .hero-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--brass); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .hero-eyebrow::before { content: ''; width: 22px; height: 1px; background: var(--brass); }
  .hero-title { font-family: 'Anton', sans-serif; font-size: clamp(2.4rem, 5.6vw, 4.2rem); line-height: 0.96; text-transform: uppercase; max-width: 15ch; }
  .hero-title em { font-style: normal; color: var(--sienna); }
  .hero-sub { color: var(--ink-soft); font-size: 0.95rem; margin-top: 18px; margin-bottom: 34px; max-width: 46ch; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); max-width: 920px; border: 1px solid var(--night-rule); border-radius: 2px; }
  .stat-card { padding: 16px 18px; border-right: 1px solid var(--night-rule); }
  .stat-card:last-child { border-right: none; }
  .stat-num { font-family: 'Anton', sans-serif; font-size: 2.3rem; line-height: 1; color: var(--paper-on-night); }
  .stat-card.red .stat-num { color: var(--sienna); }
  .stat-card.gold .stat-num { color: var(--brass); }
  .stat-card.green .stat-num { color: var(--moss); }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--ink-soft); text-transform: uppercase; margin-top: 6px; }

  .controls-wrapper { padding: 16px 44px; border-bottom: 1px solid var(--night-rule); background: rgba(28,26,20,0.85); display: flex; flex-direction: column; gap: 14px; position: sticky; top: 67px; z-index: 90; }
  .controls-top { display: flex; gap: 16px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
  .controls-bottom { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-divider { width: 1px; height: 24px; background: var(--night-rule); margin: 0 4px; }
  
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-box { width: 100%; background: var(--night-card); border: 1px solid var(--night-rule); border-radius: 2px; color: var(--paper-on-night); font-size: 0.82rem; padding: 8px 12px; font-family: 'Archivo', sans-serif; outline: none; transition: 0.2s; }
  .search-box:focus { border-color: var(--brass); }

  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn { background: var(--night-card); border: 1px solid var(--night-rule); color: var(--ink-soft); padding: 7px 13px; border-radius: 2px; font-size: 0.72rem; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover:not(:disabled) { border-color: var(--brass); color: var(--paper-on-night); }
  .filter-btn.active { background: var(--sienna); color: var(--paper); border-color: var(--sienna); }
  .clear-btn { background: transparent; border: 1px dashed var(--ink-soft); color: var(--ink-soft); }
  .clear-btn:hover { border-color: var(--sienna); color: var(--sienna); background: rgba(230,126,88,0.05); }

  select.filter-select { background: var(--night-card); border: 1px solid var(--night-rule); color: var(--paper-on-night); padding: 7px 10px; border-radius: 2px; font-size: 0.72rem; outline: none; }
  .count-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--ink-soft); margin-left: auto; }
  .count-badge strong { color: var(--brass); }

  .grid-section { padding: 30px 44px 56px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(208px, 1fr)); gap: 18px; }
  .movie-card { background: var(--night-card); border: 1px solid var(--night-rule); border-radius: 3px; cursor: pointer; position: relative; transition: 0.18s; }
  .movie-card:hover { transform: translateY(-3px); border-color: var(--brass); }
  .card-poster { height: 142px; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg, var(--night-card) 0%, #232017 100%); position: relative; }
  .card-poster-title { font-family: 'Anton', sans-serif; font-size: 1.2rem; text-transform: uppercase; color: rgba(244,238,225,0.78); text-align: center; padding: 10px; z-index: 1; }
  .card-status-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 3; }
  .card-status-bar.seen { background: var(--moss); }
  .card-status-bar.watchlist { background: var(--brass); }
  .card-status-bar.dropped { background: var(--sienna); }
  .card-type-badge { position: absolute; top: 9px; right: 9px; font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; background: rgba(21,19,15,0.72); border: 1px solid rgba(244,238,225,0.18); padding: 3px 7px; border-radius: 2px; z-index: 3; }

  .card-body { padding: 13px 14px 14px 18px; }
  .card-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 7px; }
  .card-meta { display: flex; gap: 7px; align-items: center; }
  .rating-pill { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; padding: 2px 7px; border-radius: 2px; border: 1px solid currentColor; }
  .r10 { color: var(--brass); background: rgba(184,137,63,0.16); }
  .r9  { color: #9fc285; background: rgba(86,98,76,0.22); }
  .r8  { color: #8fae72; background: rgba(86,98,76,0.18); }
  .r-none { color: #b5ad9e; background: rgba(244,238,225,0.08); border-style: dashed; }
  .meta-year { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #d4ccbd; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,9,7,0.86); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--night-card); border: 1px solid var(--night-rule); border-radius: 4px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal-header { padding: 30px 30px 20px 38px; border-bottom: 1px solid var(--night-rule); }
  .modal-title { font-family: 'Anton', sans-serif; font-size: 1.8rem; line-height: 1.08; text-transform: uppercase; margin-bottom: 12px; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(244,238,225,0.06); border: 1px solid var(--night-rule); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--paper-on-night); }
  .modal-body { padding: 22px 30px 30px 38px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; margin-bottom: 18px; }
  .modal-field-label { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--ink-soft); text-transform: uppercase; }
  .modal-field-val { font-size: 0.88rem; font-weight: 500; }
  
  .api-search-box { width: 100%; background: var(--night); border: 1px solid var(--brass); color: var(--paper-on-night); padding: 12px; margin-bottom: 15px; outline: none; }
  .api-results { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
  .api-result-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--night-rule); font-size: 0.85rem; }
  .add-btn { background: var(--night-card); border: 1px solid var(--night-rule); color: var(--ink-soft); padding: 4px 8px; cursor: pointer; }
  .add-btn:hover { color: var(--paper-on-night); border-color: var(--brass); }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-mark"><div class="reel">Cine<em>file</em></div></div>
  <div class="header-right">
    <div class="view-switcher">
      <button class="view-btn active" id="viewBtnMovies" onclick="switchView('movies')">Films & Anime</button>
      <button class="view-btn" id="viewBtnSeries" onclick="switchView('series')">Series</button>
    </div>
  </div>
</header>

<div class="view-page active" id="page-movies">
  <section class="hero">
    <div class="hero-eyebrow">Volume One</div>
    <div class="hero-title">Everything I've <em>watched</em>.</div>
    <div class="hero-sub">Rated, dated, and catalogued like a logbook.</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total entries</div></div>
      <div class="stat-card green"><div class="stat-num" id="s-seen">0</div><div class="stat-label">Already seen</div></div>
      <div class="stat-card gold"><div class="stat-num" id="s-watchlist">0</div><div class="stat-label">Watchlist</div></div>
      <div class="stat-card red"><div class="stat-num" id="s-dropped">0</div><div class="stat-label">Dropped</div></div>
      <div class="stat-card gold"><div class="stat-num" id="s-masterpiece">0</div><div class="stat-label">Masterpieces</div></div>
      <div class="stat-card green"><div class="stat-num" id="s-excellent">0</div><div class="stat-label">Rated 9+</div></div>
    </div>
  </section>

  <div class="controls-wrapper">
    <div class="controls-top">
        <input class="search-box" id="searchBox" placeholder="Search title, director, cast..." oninput="render()">
        <div style="display:flex; gap:10px;">
            <button class="filter-btn" style="border-color: var(--moss); color: var(--moss);" onclick="triggerBackup()" id="backupBtn">⛁ Backup Ledger</button>
            <button class="filter-btn" style="border-color: var(--brass); color: var(--brass);" onclick="openWebSearch()">+ Add Movie</button>
        </div>
    </div>
    <div class="controls-bottom">
        <div class="filter-group">
            <button class="filter-btn active" data-status="all" onclick="setStatus(this,'all')">All</button>
            <button class="filter-btn" data-status="seen" onclick="setStatus(this,'seen')">Seen</button>
            <button class="filter-btn" data-status="watchlist" onclick="setStatus(this,'watchlist')">Watchlist</button>
            <button class="filter-btn" data-status="dropped" onclick="setStatus(this,'dropped')">Dropped</button>
        </div>
        <div class="filter-divider"></div>
        <div class="filter-group">
            <button class="filter-btn active" data-type="all" onclick="setType(this,'all')">All Types</button>
            <button class="filter-btn" data-type="Movie" onclick="setType(this,'Movie')">Movie</button>
            <button class="filter-btn" data-type="Anime" onclick="setType(this,'Anime')">Anime</button>
        </div>
        <select class="filter-select" id="genreFilter" onchange="render()"><option value="">All Genres</option></select>
        <select class="filter-select" id="ratingFilter" onchange="render()">
            <option value="all">All Ratings</option>
            <option value="10">10</option><option value="9">9</option><option value="8">8</option>
            <option value="7">7</option><option value="6">6</option><option value="5">5</option>
            <option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option>
        </select>
        <select class="filter-select" id="sortFilter" onchange="render()">
            <option value="alpha_asc">A -> Z</option>
            <option value="alpha_desc">Z -> A</option>
            <option value="rating_desc">Rating (down)</option>
            <option value="watched_desc">Date watched (down)</option>
        </select>
        <button class="filter-btn clear-btn" onclick="clearFilters()">Clear ✕</button>
        <div class="count-badge">Showing <strong id="countBadge">0</strong> entries</div>
    </div>
  </div>

  <div class="grid-section">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="view-page" id="page-series">
  <div class="controls-wrapper">
    <button class="filter-btn" style="border-color: var(--brass); color: var(--brass);" onclick="openShowSearch()">+ Add Show</button>
  </div>
  <div class="grid-section"><div class="grid" id="seriesGrid"></div></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalBtn()">x</button>
    <div class="modal-header"><div class="modal-title" id="mTitle"></div></div>
    <div class="modal-body">
      <div class="modal-grid" id="mGrid"></div>
      <div style="margin-top:15px">
        <select id="editStatusSelect" style="padding:5px; background:var(--night); color:var(--paper-on-night); border:1px solid var(--night-rule);">
          <option value="Watchlist">Watchlist</option><option value="Already Seen">Already Seen</option><option value="Dropped">Dropped</option>
        </select>
        <button style="padding:6px 12px; background:var(--moss); border:none; color:white; cursor:pointer;" onclick="saveMovieEdit()">Save</button>
        <div id="editSaveStatus" style="color:var(--brass); margin-top:5px; font-size:0.8rem;"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="searchModalOverlay" onclick="closeWebSearch(event)">
  <div class="modal"><button class="modal-close" onclick="closeWebSearchBtn()">x</button>
    <div class="modal-header"><div class="modal-title">Add Movie</div></div>
    <div class="modal-body">
      <input type="text" class="api-search-box" id="traktSearchInput" placeholder="Type title + Enter..." onkeypress="handleTraktSearch(event)">
      <div class="api-results" id="traktResultsContainer"></div>
      <div id="apiSearchStatus" style="color: var(--brass); font-size:0.8rem;"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="showSearchModalOverlay" onclick="closeShowSearch(event)">
  <div class="modal"><button class="modal-close" onclick="closeShowSearchBtn()">x</button>
    <div class="modal-header"><div class="modal-title">Add Show</div></div>
    <div class="modal-body">
      <input type="text" class="api-search-box" id="showSearchInput" placeholder="Type show + Enter..." onkeypress="handleShowSearch(event)">
      <div class="api-results" id="showResultsContainer"></div>
      <div id="showSearchStatus" style="color: var(--brass); font-size:0.8rem;"></div>
    </div>
  </div>
</div>

let statusFilter = 'all';

function switchView(view) {
  document.getElementById('page-movies').classList.remove('active');
  document.getElementById('page-series').classList.remove('active');
  document.getElementById('viewBtnMovies').classList.remove('active');
  document.getElementById('viewBtnSeries').classList.remove('active');
  document.getElementById('page-'+view).classList.add('active');
  document.getElementById('viewBtn'+(view==='movies'?'Movies':'Series')).classList.add('active');
}

function ratingClass(r) { return r ? (r.startsWith('10') ? 'r10' : r.startsWith('9') ? 'r9' : 'r8') : 'r-none'; }

function buildCard(m, idx) {
  const sc = m.status === 'Already Seen' ? 'seen' : (m.status === 'Dropped' ? 'dropped' : 'watchlist');
  const yr = m.released ? m.released.substring(0, 4) : '';
  const rc = ratingClass(m.rating);
  let rHtml = m.rating ? `<span class="rating-pill ${rc}">${m.rating.split(' - ')}</span>` : `<span class="rating-pill r-none">--</span>`;
  return `<div class="movie-card" onclick="openModal(${idx})">
    <div class="card-poster"><div class="card-status-bar ${sc}"></div><span class="card-type-badge">${m.type}</span><div class="card-poster-title">${m.title}</div></div>
    <div class="card-body"><div class="card-title">${m.title}</div><div class="card-meta">${rHtml} <span class="meta-year">${yr}</span></div></div>
  </div>`;
}

function setStatus(btn, val) {
  statusFilter = val;
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  render();
}

function setType(btn, val) {
  typeFilter = val;
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  render();
}

function clearFilters() {
  document.getElementById('searchBox').value = '';
  document.getElementById('genreFilter').value = '';
  document.getElementById('ratingFilter').value = 'all';
  document.getElementById('sortFilter').value = 'alpha_asc';
  setStatus(document.querySelector('[data-status="all"]'), 'all');
  setType(document.querySelector('[data-type="all"]'), 'all');
}

function getFilteredMovies() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const genre = document.getElementById('genreFilter').value;
  const ratingVal = document.getElementById('ratingFilter').value;
  const sort = document.getElementById('sortFilter').value;
  
  let filtered = MOVIES.filter(m => {
    if (statusFilter === 'seen' && m.status !== 'Already Seen') return false;
    if (statusFilter === 'watchlist' && m.status !== 'Watchlist') return false;
    if (statusFilter === 'dropped' && m.status !== 'Dropped') return false;
    if (typeFilter !== 'all' && m.type !== typeFilter) return false;
    if (genre && (!m.genres || !m.genres.includes(genre))) return false;
    if (ratingVal !== 'all') {
        const numR = m.rating ? parseInt(m.rating.split(' - ')) : 0;
        if (numR !== parseInt(ratingVal)) return false;
    }
    if (q && !m.title.toLowerCase().includes(q) && !(m.director && m.director.toLowerCase().includes(q)) && !(m.cast && m.cast.toLowerCase().includes(q))) return false;
    return true;
  });
  
  if (sort === 'rating_desc') filtered.sort((a,b) => (parseInt(b.rating) || 0) - (parseInt(a.rating) || 0));
  else if (sort === 'watched_desc') filtered.sort((a,b) => (b.dateWatched||'').localeCompare(a.dateWatched||''));
  else if (sort === 'alpha_desc') filtered.sort((a,b) => b.title.localeCompare(a.title));
  else filtered.sort((a,b) => a.title.localeCompare(b.title));
  
  return filtered;
}

function render() {
  const f = getFilteredMovies();
  document.getElementById('grid').innerHTML = f.slice(0, 50).map(m => buildCard(m, MOVIES.indexOf(m))).join('');
  document.getElementById('countBadge').textContent = f.length;
}

function openModal(idx) {
  const m = MOVIES[idx]; currentModalMovie = m;
  document.getElementById('mTitle').textContent = m.title;
  const fields = [['Director', m.director], ['Cast', m.cast || '--'], ['Released', m.released], ['Date watched', m.dateWatched || '--']];
  document.getElementById('mGrid').innerHTML = fields.map(([l, v]) => `<div><div class="modal-field-label">${l}</div><div class="modal-field-val">${v}</div></div>`).join('');
  document.getElementById('editStatusSelect').value = m.status || 'Watchlist';
  document.getElementById('editSaveStatus').textContent = '';
  document.getElementById('modalOverlay').classList.add('open');
}

async function saveMovieEdit() {
  if (!currentModalMovie) return;
  const sEl = document.getElementById('editSaveStatus');
  sEl.textContent = 'Saving...';
  try {
    const res = await fetch('/api/update_movie', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: currentModalMovie.url, title: currentModalMovie.title, status: document.getElementById('editStatusSelect').value }) });
    const data = await res.json();
    if (data.status === 'success') { sEl.textContent = 'Saved.'; setTimeout(() => window.location.reload(), 800); }
    else sEl.textContent = 'Error: ' + data.message;
  } catch (e) { sEl.textContent = 'Network error.'; }
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modalOverlay').classList.remove('open'); currentModalMovie = null; }

async function triggerBackup() {
  const btn = document.getElementById('backupBtn'); const ot = btn.innerHTML;
  btn.innerHTML = '⏳ Backing up...'; btn.disabled = true;
  try {
    const res = await fetch('/api/backup', {method: 'POST'});
    const data = await res.json();
    btn.innerHTML = data.status === 'success' ? '✅ Backup Created!' : '❌ Backup Failed';
  } catch(e) { btn.innerHTML = '❌ Network Error'; }
  setTimeout(() => { btn.innerHTML = ot; btn.disabled = false; }, 3000);
}

function openWebSearch() { document.getElementById('searchModalOverlay').classList.add('open'); }
function closeWebSearch(e) { if (e.target === document.getElementById('searchModalOverlay')) closeWebSearchBtn(); }
function closeWebSearchBtn() { document.getElementById('searchModalOverlay').classList.remove('open'); document.getElementById('traktResultsContainer').innerHTML = ''; }

async function handleTraktSearch(e) {
  if (e.key !== 'Enter') return;
  const c = document.getElementById('traktResultsContainer'); const st = document.getElementById('apiSearchStatus');
  st.textContent = 'Searching Trakt...'; c.innerHTML = '';
  try {
    const res = await fetch(`https://api.trakt.tv/search/movie?query=${encodeURIComponent(e.target.value)}`, { headers: { 'Content-Type': 'application/json', 'trakt-api-version': '2', 'trakt-api-key': TRAKT_KEY } });
    const data = await res.json();
    st.textContent = data.length ? `${data.length} results found.` : 'No results found.';
    data.slice(0, 10).forEach(i => {
      c.innerHTML += `<div class="api-result-item"><div><strong>${i.movie.title}</strong></div>
        <div><button class="add-btn" onclick="addMovieToBackend('${i.movie.ids.slug}', 'Watchlist')">+ Add</button></div></div>`;
    });
  } catch (error) { st.textContent = 'Failed to fetch from Trakt.'; }
}

async function addMovieToBackend(slug, stat) {
  const sd = document.getElementById('apiSearchStatus'); sd.textContent = `Adding...`;
  try {
    const res = await fetch('/api/add_movie', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ slug: slug, status: stat }) });
    const data = await res.json();
    if (res.ok && data.status === 'success') { sd.textContent = `Success!`; setTimeout(() => window.location.reload(), 1500); }
    else throw new Error(data.message);
  } catch (err) { sd.textContent = `Error: ${err.message}`; }
}

function openShowSearch() { document.getElementById('showSearchModalOverlay').classList.add('open'); }
function closeShowSearch(e) { if (e.target === document.getElementById('showSearchModalOverlay')) closeShowSearchBtn(); }
function closeShowSearchBtn() { document.getElementById('showSearchModalOverlay').classList.remove('open'); document.getElementById('showResultsContainer').innerHTML = ''; }
async function handleShowSearch(e) { /* Simplified series search */ }

function updateStats() {
  document.getElementById('s-total').textContent = MOVIES.length;
  document.getElementById('s-seen').textContent = MOVIES.filter(m => m.status === 'Already Seen').length;
  document.getElementById('s-watchlist').textContent = MOVIES.filter(m => m.status === 'Watchlist').length;
  document.getElementById('s-dropped').textContent = MOVIES.filter(m => m.status === 'Dropped').length;
  document.getElementById('s-masterpiece').textContent = MOVIES.filter(m => m.rating === '10 - Masterpiece').length;
  document.getElementById('s-excellent').textContent = MOVIES.filter(m => m.rating === '9 - Excellent' || m.rating === '10 - Masterpiece').length;
  
  // Populate genres select
  const allGenres = new Set();
  MOVIES.forEach(m => { if (m.genres) m.genres.split(', ').forEach(g => allGenres.add(g.trim())); });
  const genreSelect = document.getElementById('genreFilter');
  [...allGenres].sort().forEach(g => { if(!g) return; const opt = document.createElement('option'); opt.value = g; opt.textContent = g; genreSelect.appendChild(opt); });
}

render();
updateStats();
</script>
